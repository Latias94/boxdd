name: Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build and upload static site
    runs-on: ubuntu-latest
    env:
      EMSDK_VERSION: "6.0.2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: Install Emscripten SDK
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${EMSDK_VERSION}" https://github.com/emscripten-core/emsdk.git "${RUNNER_TEMP}/emsdk"
          "${RUNNER_TEMP}/emsdk/emsdk" install "${EMSDK_VERSION}"
          "${RUNNER_TEMP}/emsdk/emsdk" activate "${EMSDK_VERSION}"
          echo "EMSDK=${RUNNER_TEMP}/emsdk" >> "$GITHUB_ENV"
          echo "${RUNNER_TEMP}/emsdk" >> "$GITHUB_PATH"
          echo "${RUNNER_TEMP}/emsdk/upstream/emscripten" >> "$GITHUB_PATH"
          echo "${RUNNER_TEMP}/emsdk/upstream/bin" >> "$GITHUB_PATH"

      - name: Build Pages WASM assets
        run: cargo run -p xtask -- build-pages-wasm

      - name: Validate Pages content
        run: cargo run -p xtask -- validate-pages

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/pages

  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
