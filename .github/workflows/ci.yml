name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint + Test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: |
          # `boxdd-sys` keeps `bindgen` behind an optional feature to avoid requiring libclang.
          cargo clippy -p boxdd-sys --all-targets -- -D warnings
          cargo clippy -p boxdd --all-targets --all-features -- -D warnings

      - name: tests (core)
        run: |
          cargo test
          cargo test --features serialize
          cargo test --features unchecked
          cargo test --features mint
          cargo test --features bytemuck
          cargo test --features glam
          cargo test --features "bytemuck glam"

      - name: system-link smoke (BOX2D_LIB_DIR)
        shell: bash
        run: |
          set -euxo pipefail
          # Build from source once to get a libbox2d.a, then rebuild in "system link" mode.
          cargo build -p boxdd-sys --quiet
          LIB="$(ls target/debug/build/boxdd-sys-*/out/libbox2d.a | head -n 1)"
          SYS_DIR="$(mktemp -d)"
          cp "$LIB" "$SYS_DIR/"
          cargo clean -p boxdd-sys
          BOX2D_LIB_DIR="$SYS_DIR" BOXDD_SYS_LINK_KIND=static cargo test -p boxdd --quiet

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --all-targets --verbose

      - name: Docs
        env:
          RUSTDOCFLAGS: --cfg docsrs
        run: cargo doc --no-deps --workspace

      - name: Docs (docs.rs offline mode)
        env:
          DOCS_RS: "1"
        run: |
          # Verify docs build path that skips native C build and uses pregenerated bindings
          cargo doc -p boxdd-sys --no-deps

  features:
    name: Feature Matrix (ubuntu-latest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features: [
          "",
          "serde",
          "serialize",
          "cgmath",
          "nalgebra",
          "glam",
          "bytemuck",
          "bytemuck glam",
          "serde cgmath nalgebra",
          "serde glam",
          "serde bytemuck",
          "serde bytemuck glam",
          "serialize glam",
          "serialize bytemuck",
          "serialize bytemuck glam",
          "serialize cgmath nalgebra",
        ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo check (boxdd with features="${{ matrix.features }}")
        shell: bash
        run: |
          set -euxo pipefail
          FEATS='${{ matrix.features }}'
          if [ -z "$FEATS" ]; then
            cargo check -p boxdd --quiet
          else
            cargo check -p boxdd --features "$FEATS" --quiet
          fi

  wasm:
    name: WASM Checks (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm targets
        run: |
          rustup target add wasm32-unknown-unknown
          rustup target add wasm32-wasip1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo check (boxdd-sys, wasm32-unknown-unknown)
        run: |
          cargo check -p boxdd-sys --target wasm32-unknown-unknown --quiet

      - name: cargo check (boxdd-sys, wasm32-wasip1)
        run: |
          cargo check -p boxdd-sys --target wasm32-wasip1 --quiet

  wasm-strict:
    name: WASM Strict Bindings (conditional)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm targets
        run: |
          rustup target add wasm32-unknown-unknown
          rustup target add wasm32-wasip1

      - name: Strict check (only if pregenerated or sysroot present)
        env:
          BOXDD_SYS_STRICT_WASM_BINDINGS: "1"
        shell: bash
        run: |
          set -euo pipefail
          has_pregen="$(test -f boxdd-sys/src/wasm_bindings_pregenerated.rs && echo yes || echo no)"
          if [ "$has_pregen" = "yes" ] || [ -n "${WASI_SDK_PATH:-}" ] || [ -n "${EMSDK:-}" ]; then
            echo "Strict mode enabled with available wasm bindings/sysroot; running checks."
            cargo check -p boxdd-sys --target wasm32-unknown-unknown --quiet || exit 1
            cargo check -p boxdd-sys --target wasm32-wasip1 --quiet || exit 1
          else
            echo "Skipping strict wasm checks (no pregenerated bindings and no sysroot configured)."
          fi
